<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Path Pursuit</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230a0b0a'/%3E%3Cpath d='M32 28 L60 50 L32 72' stroke='%234ade80' stroke-width='11' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M50 28 L78 50 L50 72' stroke='%234ade80' stroke-width='11' fill='none' stroke-linecap='round' stroke-linejoin='round' opacity='0.45'/%3E%3C/svg%3E" />
  <style>
    :root {
      --bg: #0a0b0a; --surface: #111211; --border: #1e1f1e; --card: #131413;
      --card2: #161716; --accent: #4ade80; --adim: #0d1f15; --aborder: #1a3a2a;
      --text: #e8e9e8; --sub: #9ca3af; --muted: #6b7280; --tag: #1a1b1a;
      --blue: #60a5fa; --bdim: #0d1525; --bborder: #1a2a50;
      --yellow: #fbbf24; --ydim: #1a1200; --yborder: #3a2800;
      --red: #f87171; --rdim: #1a0808; --rborder: #3a1515;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; min-height: 100vh; font-size: 15px; }

    /* ── Header & Nav ── */
    .hdr { padding: 16px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--bg); z-index: 20; }
    .logo-row { display: flex; align-items: center; gap: 10px; }
    .logo-icon { flex-shrink: 0; border-radius: 7px; }
    .logo { font-size: 1.05rem; font-weight: 700; letter-spacing: -.02em; }
    .logo-arr { color: var(--accent); }
    .logo-sub { font-size: .72rem; color: var(--muted); margin-top: 1px; }
    .nav { display: flex; border-bottom: 1px solid var(--border); padding: 0 28px; }
    .ntab { padding: 11px 15px; font-size: 0.83rem; font-weight: 500; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .15s; user-select: none; }
    .ntab:hover { color: var(--text); }
    .ntab.on { color: var(--accent); border-bottom-color: var(--accent); }
    .nbadge { background: var(--accent); color: #0a0b0a; font-size: .65rem; font-weight: 700; padding: 1px 5px; border-radius: 10px; margin-left: 4px; vertical-align: middle; }

    /* ── Buttons ── */
    .btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px; border-radius: 7px; font-size: .82rem; font-weight: 600; cursor: pointer; border: none; text-decoration: none; font-family: inherit; transition: opacity .15s; white-space: nowrap; }
    .btn:hover { opacity: .82; }
    .btn-p { background: var(--accent); color: #0a0b0a; }
    .btn-g { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-g:hover { border-color: #3a3b3a; }
    .btn-d { background: var(--adim); border: 1px solid var(--aborder); color: var(--accent); }
    .btn-sm { padding: 5px 10px; font-size: .76rem; }
    .btn-lg { padding: 11px 22px; font-size: .92rem; }
    .btn-full { width: 100%; justify-content: center; }
    .btn-r { background: var(--rdim); border: 1px solid var(--rborder); color: var(--red); }

    /* ── Inputs ── */
    input, textarea, select { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 9px 13px; border-radius: 7px; font-size: .875rem; outline: none; font-family: inherit; transition: border-color .15s; width: 100%; }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    input::placeholder, textarea::placeholder { color: var(--muted); }
    textarea { resize: vertical; line-height: 1.5; }
    select { cursor: pointer; }
    select option { background: #1a1b1a; }
    .lbl { display: block; font-size: .75rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .04em; }
    .fld { margin-bottom: 18px; }
    .hint { font-size: .73rem; color: var(--muted); margin-top: 5px; }

    /* ── Layout ── */
    .wrap { max-width: 820px; margin: 0 auto; padding: 26px 28px 60px; }

    /* ── Setup ── */
    .setup-outer { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .setup-box { width: 100%; max-width: 540px; }
    .setup-logo-row { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
    .setup-logo-icon { flex-shrink: 0; border-radius: 9px; }
    .setup-logo { font-size: 1.5rem; font-weight: 800; letter-spacing: -.03em; }
    .setup-sub { color: var(--muted); margin-bottom: 30px; font-size: .88rem; }
    .setup-step { font-size: .7rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 14px; margin-top: 24px; }
    .setup-row { display: flex; gap: 10px; align-items: center; margin-top: 6px; }

    /* ── Discover ── */
    .disc-head { margin-bottom: 24px; }
    .disc-head h2 { font-size: 1.3rem; font-weight: 700; letter-spacing: -.02em; margin-bottom: 5px; }
    .disc-head p { color: var(--sub); font-size: .88rem; }
    .disc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 28px; }
    .dcard { background: var(--card); border: 1px solid var(--border); border-radius: 11px; padding: 20px; cursor: pointer; transition: border-color .15s, background .15s; }
    .dcard:hover { border-color: var(--aborder); background: var(--card2); }
    .dcard.off { opacity: .45; cursor: default; pointer-events: none; }
    .dcard-icon { font-size: 1.6rem; margin-bottom: 9px; }
    .dcard-title { font-size: .9rem; font-weight: 700; margin-bottom: 3px; }
    .dcard-desc { font-size: .77rem; color: var(--sub); line-height: 1.4; }
    .dcard-note { font-size: .7rem; color: var(--accent); margin-top: 7px; font-weight: 600; }
    .sec-lbl { font-size: .78rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 12px; }
    .sec-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 9px; }
    .stile { background: var(--card); border: 1px solid var(--border); border-radius: 9px; padding: 13px 10px; cursor: pointer; text-align: center; transition: border-color .15s, background .15s; }
    .stile:hover { border-color: var(--aborder); background: var(--card2); }
    .stile-icon { font-size: 1.3rem; margin-bottom: 5px; }
    .stile-name { font-size: .73rem; font-weight: 600; color: var(--sub); line-height: 1.3; }

    /* ── AI Loading / Results ── */
    .ai-load { text-align: center; padding: 40px 20px; }
    .ai-load-icon { font-size: 2.2rem; margin-bottom: 10px; }
    .ai-load-title { font-weight: 700; margin-bottom: 5px; }
    .ai-load-sub { color: var(--muted); font-size: .85rem; }
    .sug-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 20px; }
    .sug-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; cursor: pointer; transition: border-color .15s; }
    .sug-chip:hover { border-color: var(--aborder); }
    .sug-title { font-size: .87rem; font-weight: 600; margin-bottom: 3px; }
    .sug-reason { font-size: .74rem; color: var(--sub); }

    /* ── Quiz ── */
    .quiz-wrap { max-width: 520px; }
    .quiz-prog { font-size: .75rem; color: var(--muted); margin-bottom: 5px; }
    .quiz-q { font-size: 1.05rem; font-weight: 700; margin-bottom: 18px; }
    .quiz-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .qopt { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 15px; cursor: pointer; transition: border-color .15s, background .15s; }
    .qopt:hover { border-color: var(--aborder); background: var(--card2); }
    .qopt-icon { font-size: 1.3rem; margin-bottom: 7px; }
    .qopt-lbl { font-size: .86rem; font-weight: 600; margin-bottom: 2px; }
    .qopt-desc { font-size: .73rem; color: var(--sub); }
    .res-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
    .res-chip { background: var(--adim); border: 1px solid var(--aborder); color: var(--accent); padding: 7px 14px; border-radius: 20px; font-size: .82rem; font-weight: 600; cursor: pointer; transition: opacity .15s; }
    .res-chip:hover { opacity: .8; }

    /* ── Search ── */
    .sbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; gap: 9px; flex-wrap: wrap; align-items: center; }
    #skw { flex: 1; min-width: 180px; }
    .extbar { padding: 9px 28px; border-bottom: 1px solid var(--border); background: #0b0c0b; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .ext-lbl { font-size: .72rem; color: var(--muted); white-space: nowrap; }
    .elink { font-size: .76rem; color: var(--muted); text-decoration: none; border: 1px solid var(--border); padding: 3px 9px; border-radius: 5px; transition: all .15s; }
    .elink:hover { color: var(--text); border-color: #3a3b3a; }
    .rbar { padding: 11px 28px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .rcount { color: var(--muted); font-size: .8rem; }
    .jlist { padding: 14px 28px 40px; display: grid; gap: 9px; }
    .jcard { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; transition: border-color .15s; }
    .jcard:hover { border-color: #2a2b2a; }
    .jcard.is-saved { border-color: var(--aborder); }
    .jtitle { font-size: .95rem; font-weight: 600; margin-bottom: 5px; }
    .jmeta { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; margin-bottom: 9px; font-size: .78rem; color: var(--muted); }
    .jco { font-weight: 500; color: var(--sub); }
    .jdot { color: #3a3b3a; }
    .tag { background: var(--tag); border: 1px solid var(--border); border-radius: 3px; padding: 1px 6px; font-size: .71rem; color: var(--muted); }
    .tag-l { background: var(--adim); border-color: var(--aborder); color: var(--accent); }
    .jdesc { color: var(--sub); font-size: .79rem; line-height: 1.5; margin-bottom: 13px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .jact { display: flex; gap: 7px; flex-wrap: wrap; align-items: center; }
    .jdate { margin-left: auto; color: var(--muted); font-size: .73rem; }
    .pagn { padding: 18px 28px 40px; display: flex; gap: 5px; justify-content: center; flex-wrap: wrap; }

    /* ── Saved ── */
    .sv-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 15px 17px; margin-bottom: 9px; }
    .sv-top { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px; }
    .sv-info { flex: 1; min-width: 0; }
    .sv-title { font-size: .92rem; font-weight: 600; margin-bottom: 2px; }
    .sv-co { font-size: .8rem; color: var(--sub); }
    .sv-act { display: flex; gap: 7px; flex-wrap: wrap; align-items: center; }
    .st-sel { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 4px 8px; border-radius: 5px; font-size: .76rem; cursor: pointer; font-family: inherit; }
    .sbadge { font-size: .7rem; font-weight: 600; padding: 2px 7px; border-radius: 3px; border: 1px solid; }
    .sb-saved { background: var(--tag); border-color: var(--border); color: var(--muted); }
    .sb-applied { background: var(--bdim); border-color: var(--bborder); color: var(--blue); }
    .sb-interviewing { background: var(--ydim); border-color: var(--yborder); color: var(--yellow); }
    .sb-offered { background: var(--adim); border-color: var(--aborder); color: var(--accent); }
    .sb-rejected { background: var(--rdim); border-color: var(--rborder); color: var(--red); }

    /* ── Settings ── */
    .ss { margin-bottom: 28px; }
    .ss h3 { font-size: .9rem; font-weight: 700; margin-bottom: 12px; padding-bottom: 9px; border-bottom: 1px solid var(--border); }

    /* ── Generic states ── */
    .empty { text-align: center; padding: 50px 20px; color: var(--muted); font-size: .88rem; line-height: 1.6; }
    .empty strong { color: var(--text); display: block; margin-bottom: 5px; font-size: .98rem; }
    .back-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .back-row span { color: var(--muted); font-size: .82rem; }
    hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

    /* ── Toast ── */
    .toast { position: fixed; bottom: 22px; right: 22px; background: var(--accent); color: #0a0b0a; padding: 10px 15px; border-radius: 8px; font-size: .83rem; font-weight: 600; opacity: 0; transform: translateY(5px); transition: all .2s; pointer-events: none; max-width: 280px; z-index: 999; }
    .toast.on { opacity: 1; transform: translateY(0); }

    @media (max-width: 620px) {
      .hdr, .nav, .sbar, .extbar, .rbar, .jlist, .pagn { padding-left: 14px; padding-right: 14px; }
      .wrap { padding: 18px 14px 50px; }
      .disc-grid, .quiz-opts, .sug-grid { grid-template-columns: 1fr; }
      .sec-grid { grid-template-columns: repeat(2, 1fr); }
      .jdate { display: none; }
    }
  </style>
</head>
<body>

<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
/* ─── Config ─────────────────────────────────────────────── */
const INFLOW = 'https://activecatalyst.github.io/InFlow/';
const KEYS = { resume: 'inflow_resume_v2', apiKey: 'inflow_api_key', proxy: 'inflow_proxy_url', saved: 'sdjobs_saved_v1' };

/* ─── State ──────────────────────────────────────────────── */
let S = {
  view: 'discover',        // setup | discover | search | saved | settings
  resume: '', apiKey: '',
  savedJobs: [],
  discMode: null,          // null | ai-loading | ai-results | quiz
  aiSugs: [], quizStep: 0, quizAns: {},
  results: undefined,      // undefined=unsearched, null=error, []=searched
  loading: false,
  page: 1, totalPages: 1,
  lastQ: { kw: '', cat: '', level: '' },
};

/* ─── Storage ────────────────────────────────────────────── */
function loadStorage() {
  S.resume  = localStorage.getItem(KEYS.resume)  || '';
  S.apiKey  = localStorage.getItem(KEYS.apiKey)  || '';
  S.savedJobs = JSON.parse(localStorage.getItem(KEYS.saved) || '[]');
  S.view = S.resume.trim().length >= 50 ? 'discover' : 'setup';
}
function persS() { localStorage.setItem(KEYS.saved, JSON.stringify(S.savedJobs)); }

/* ─── Utilities ──────────────────────────────────────────── */
let _tt;
function toast(m) { const el=document.getElementById('toast'); el.textContent=m; el.classList.add('on'); clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('on'),2800); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function strip(h) { const d=document.createElement('div'); d.innerHTML=h; return d.textContent||''; }
function ago(d) { if(!d) return ''; const s=(Date.now()-new Date(d))/1000; if(s<3600) return `${Math.floor(s/60)}m ago`; if(s<86400) return `${Math.floor(s/3600)}h ago`; if(s<2592e3) return `${Math.floor(s/86400)}d ago`; return `${Math.floor(s/2592e3)}mo ago`; }
function isSaved(url) { return S.savedJobs.some(j=>j.url===url); }

/* ─── Data ───────────────────────────────────────────────── */
const SECTORS = [
  { icon:'🛡️', name:'Defense & Military',    kw:'defense',            cat:'Engineering',              note:'SAIC · Leidos · Northrop Grumman' },
  { icon:'🧬', name:'Biotech & Life Sciences',kw:'biotech',            cat:'Science and Research',     note:'Illumina · Sorrento Valley cluster' },
  { icon:'💻', name:'Tech & Software',        kw:'software engineer',  cat:'Engineering',              note:'Qualcomm · ServiceNow · startups' },
  { icon:'🏥', name:'Healthcare',             kw:'healthcare',         cat:'Healthcare and Medicine',  note:'UCSD Health · Scripps · Sharp' },
  { icon:'🏛️', name:'Government',            kw:'government',         cat:'Operations',               note:'City · County · Federal agencies' },
  { icon:'💰', name:'Finance & Banking',      kw:'finance',            cat:'Finance',                  note:'USAA · banks · financial services' },
  { icon:'🎓', name:'Education',              kw:'teacher education',  cat:'',                         note:'UCSD · SDSU · K-12 · community colleges' },
  { icon:'🌊', name:'Hospitality',            kw:'hospitality',        cat:'Customer Service',         note:'Hotels · tourism · restaurants' },
];

const CATS = ['Account Management','Business Development','Customer Service','Data and Analytics','Design and UX','Engineering','Finance','Healthcare and Medicine','HR and Recruiting','Legal','Marketing and PR','Operations','Product','Project and Program Management','Sales','Science and Research'];
const LEVELS = ['Entry Level','Mid Level','Senior Level','Director','VP'];

const QS = [
  { q: 'What kind of work fits you best?', opts: [
    { icon:'🤝', lbl:'Working with people',   desc:'Helping, teaching, care, sales', k:'people'    },
    { icon:'📊', lbl:'Data & problem-solving', desc:'Analysis, systems, tech',       k:'technical'  },
    { icon:'🎨', lbl:'Building & creating',    desc:'Design, engineering, science',  k:'creative'   },
    { icon:'📋', lbl:'Leading & organizing',   desc:'Managing teams, ops, planning', k:'leadership' },
  ]},
  { q: 'Which San Diego industry appeals to you?', opts: [
    { icon:'💻', lbl:'Tech & Innovation',     desc:'Software, startups, digital',   k:'tech'       },
    { icon:'🏥', lbl:'Healthcare & Medicine', desc:'Hospitals, biotech, wellness',  k:'healthcare' },
    { icon:'🛡️', lbl:'Defense & Government', desc:'Military, federal, public',     k:'defense'    },
    { icon:'💼', lbl:'Business & Finance',    desc:'Corporate, banking, services',  k:'business'   },
  ]},
  { q: "What's your experience level?", opts: [
    { icon:'🌱', lbl:'Entry level',     desc:'0–2 years',        k:'entry',  level:'Entry Level' },
    { icon:'📈', lbl:'Mid-level',       desc:'2–5 years',        k:'mid',    level:'Mid Level'   },
    { icon:'⭐', lbl:'Senior',          desc:'5+ years',         k:'senior', level:'Senior Level'},
    { icon:'🔄', lbl:'Career change',   desc:'New direction',    k:'change', level:'Entry Level' },
  ]},
];

const QMAP = {
  'people+tech':       ['Customer Success Manager','Technical Recruiter','IT Support Specialist','Sales Development Rep'],
  'people+healthcare': ['Registered Nurse','Medical Assistant','Patient Coordinator','Social Worker'],
  'people+defense':    ['HR Specialist','Training Coordinator','Communications Specialist','Recruiter'],
  'people+business':   ['Account Manager','HR Generalist','Sales Representative','Customer Service Manager'],
  'technical+tech':    ['Software Engineer','Data Analyst','DevOps Engineer','Product Manager'],
  'technical+healthcare':['Health Informatics Analyst','Biomedical Engineer','Clinical Data Manager'],
  'technical+defense': ['Systems Engineer','Cybersecurity Analyst','Intelligence Analyst','Software Developer'],
  'technical+business':['Financial Analyst','Business Analyst','Operations Analyst','Data Analyst'],
  'creative+tech':     ['UX Designer','Frontend Developer','Product Designer','UX Researcher'],
  'creative+healthcare':['Healthcare Marketing Specialist','Medical Writer','Patient Education Specialist'],
  'creative+defense':  ['Technical Writer','Training Developer','Graphic Designer'],
  'creative+business': ['Marketing Manager','Content Strategist','Graphic Designer','Brand Manager'],
  'leadership+tech':   ['Engineering Manager','Product Manager','Scrum Master','IT Project Manager'],
  'leadership+healthcare':['Nurse Manager','Healthcare Administrator','Clinical Operations Manager'],
  'leadership+defense':['Program Manager','Operations Manager','Logistics Manager','Project Manager'],
  'leadership+business':['Operations Manager','Project Manager','Business Development Manager','Director of Operations'],
};

/* ─── Claude API ─────────────────────────────────────────── */
async function callClaude(sys, user) {
  if (!S.apiKey) throw new Error('No API key — add it in Settings');
  const proxy = localStorage.getItem(KEYS.proxy);
  const url = proxy || 'https://api.anthropic.com/v1/messages';
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type':'application/json', 'x-api-key':S.apiKey, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' },
    body: JSON.stringify({ model:'claude-haiku-4-5-20251001', max_tokens:900, system:sys, messages:[{role:'user',content:user}] })
  });
  if (!res.ok) { const e=await res.json().catch(()=>({})); throw new Error(e.error?.message||`API error ${res.status}`); }
  return (await res.json()).content[0].text;
}

async function runAI() {
  S.discMode = 'ai-loading';
  render();
  try {
    const txt = await callClaude(
      'You are a San Diego career advisor. Output only valid JSON arrays.',
      `Based on this resume, suggest exactly 8 specific job titles for San Diego, CA.
Each item: {"title":"2-4 word job title","reason":"max 12 words why it fits","category":"Engineering|Healthcare|Finance|Sales|Operations|Design|Marketing|Government"}
Respond with ONLY the JSON array.

Resume:
${S.resume.slice(0,2800)}`
    );
    const arr = JSON.parse(txt.match(/\[[\s\S]*\]/)?.[0] || '[]');
    S.aiSugs = arr.slice(0,8);
    S.discMode = 'ai-results';
  } catch(e) {
    toast('AI error: ' + e.message);
    S.discMode = null;
  }
  render();
}

/* ─── Job Search ─────────────────────────────────────────── */
async function fetchPage(params, pageIdx) {
  const p = new URLSearchParams({...params, page:pageIdx, descending:'true'});
  const r = await fetch(`https://www.themuse.com/api/public/jobs?${p}`);
  if (!r.ok) throw new Error('fetch failed');
  return r.json();
}

async function doSearch(kw='', cat='', level='', page=1) {
  S.loading = true; S.page = page; S.lastQ = {kw,cat,level};
  if (S.view !== 'search') S.view = 'search';
  render();

  const params = { location:'San Diego, CA' };
  if (cat)   params.category = cat;
  if (level) params.level    = level;

  try {
    let results, totalPages;
    if (kw.trim()) {
      // Fetch 4 pages in parallel for keyword searches for better coverage
      const pages = await Promise.all([0,1,2,3].map(i => fetchPage(params,i).catch(()=>({results:[],page_count:1}))));
      totalPages = pages[0].page_count || 1;
      const kl = kw.toLowerCase();
      const all = pages.flatMap(p => p.results||[]);
      const seen = new Set();
      results = all.filter(j => {
        if (seen.has(j.id)) return false; seen.add(j.id);
        return j.name.toLowerCase().includes(kl) || (j.company?.name||'').toLowerCase().includes(kl) || strip(j.contents||'').toLowerCase().includes(kl);
      });
    } else {
      const data = await fetchPage(params, page-1);
      results = data.results||[];
      totalPages = data.page_count||1;
    }
    S.results = results; S.totalPages = kw.trim() ? 1 : totalPages;
  } catch {
    S.results = null;
  }
  S.loading = false;
  render();
}

/* ─── Saved Jobs ─────────────────────────────────────────── */
function saveJob(j) {
  if (isSaved(j.url)) { toast('Already saved!'); return; }
  S.savedJobs.unshift({...j, savedAt:Date.now(), status:'saved'});
  persS(); toast('Saved!'); render();
}
function setStatus(url, status) { const j=S.savedJobs.find(j=>j.url===url); if(j){j.status=status;persS();render();} }
function removeJob(url) { S.savedJobs=S.savedJobs.filter(j=>j.url!==url); persS(); toast('Removed'); render(); }

/* ─── Copy helpers ───────────────────────────────────────── */
async function copyText(text, msg) { try { await navigator.clipboard.writeText(text); toast(msg); } catch { toast('Could not copy automatically.'); } }
async function analyzeInFlow(url) { try{await navigator.clipboard.writeText(url);}catch{} window.open(INFLOW,'_blank'); toast('URL copied! Paste it into InFlow.'); }

/* ─── External links ─────────────────────────────────────── */
function extLinks(kw='') {
  const q = encodeURIComponent(kw);
  return [
    ['LinkedIn', `https://www.linkedin.com/jobs/search/?keywords=${q}&location=San+Diego%2C+CA`],
    ['Indeed',   `https://www.indeed.com/jobs?q=${q}&l=San+Diego%2C+CA`],
    ['Glassdoor',`https://www.glassdoor.com/Job/san-diego-${q}-jobs-SRCH_IL.0,9_IC1147311.htm`],
    ['USAJobs',  `https://www.usajobs.gov/Search/Results?l=San+Diego%2C+CA&k=${q}`],
    ['Lever',    `https://jobs.lever.co/?location=San+Diego`],
  ].map(([n,u])=>`<a class="elink" href="${esc(u)}" target="_blank">${esc(n)} ↗</a>`).join('');
}

function renderMain() {

function renderQuiz() {
  const step = S.quizStep;
  if (step >= QS.length) {
    const w = S.quizAns[0]?.k, ind = S.quizAns[1]?.k, exp = S.quizAns[2];
    const jobs = QMAP[`${w}+${ind}`] || ['Project Manager','Operations Coordinator','Business Analyst','Marketing Coordinator'];
    return `
      <div class="wrap">
        <div class="back-row">
          <button class="btn btn-g btn-sm" data-back="discover">← Back</button>
          <span>Based on your answers — click any to search</span>
        </div>
        <div class="quiz-wrap">
          <div class="res-chips">
            ${jobs.map(j=>`<div class="res-chip" data-srch="${esc(j)}" data-level="${esc(exp?.level||'')}">${esc(j)}</div>`).join('')}
          </div>
          <button class="btn btn-g btn-sm" id="retake">Retake quiz</button>
        </div>
      </div>`;
  }
  const q = QS[step];
  return `
    <div class="wrap">
      <div class="quiz-wrap">
        <div class="quiz-prog">Question ${step+1} of ${QS.length}</div>
        <div class="quiz-q">${esc(q.q)}</div>
        <div class="quiz-opts">
          ${q.opts.map((o,i)=>`
            <div class="qopt" data-qi="${i}">
              <div class="qopt-icon">${o.icon}</div>
              <div class="qopt-lbl">${esc(o.lbl)}</div>
              <div class="qopt-desc">${esc(o.desc)}</div>
            </div>`).join('')}
        </div>
        ${step>0?`<div style="margin-top:14px"><button class="btn btn-g btn-sm" id="qback">← Back</button></div>`:''}
      </div>
    </div>`;
}

/* ── Search ── */
function renderSearch() {
  const {kw,cat,level} = S.lastQ;
  let body;
  if (S.loading) {
    body = '<div class="empty">Searching San Diego jobs…</div>';
  } else if (S.results === null) {
    body = '<div class="empty"><strong>Connection error</strong>Check your internet and try again.</div>';
  } else if (!Array.isArray(S.results)) {
    body = `<div class="empty"><strong>Search San Diego jobs</strong>Enter keywords above, or <button class="btn btn-g btn-sm" data-nav="discover">use Discovery →</button></div>`;
  } else if (S.results.length === 0) {
    body = '<div class="empty"><strong>No jobs found</strong>Try different keywords, or check the external boards above.</div>';
  } else {
    const pageInfo = !kw && S.totalPages>1 ? `· Page ${S.page} of ${S.totalPages}` : '';
    body = `
      <div class="rbar">
        <div class="rcount">${S.results.length} job${S.results.length!==1?'s':''} in San Diego${kw?` for "${esc(kw)}"`:''}  ${pageInfo}</div>
      </div>
      <div class="jlist">${S.results.map(j=>renderCard(j)).join('')}</div>
      ${!kw && S.totalPages>1 ? renderPagn(S.totalPages,S.page) : ''}`;
  }

  return `
    <div class="sbar">
      <input type="text" id="skw" value="${esc(kw)}" placeholder="Job title, skills, company…" />
      <select id="scat">
        <option value="">All Categories</option>
        ${CATS.map(c=>`<option value="${esc(c)}" ${cat===c?'selected':''}>${esc(c)}</option>`).join('')}
      </select>
      <select id="slvl">
        <option value="">All Levels</option>
        ${LEVELS.map(l=>`<option value="${esc(l)}" ${level===l?'selected':''}>${esc(l)}</option>`).join('')}
      </select>
      <button class="btn btn-p" id="doSearch">Search</button>
    </div>
    <div class="extbar">
      <span class="ext-lbl">Also search on:</span>
      ${extLinks(kw)}
    </div>
    ${body}`;
}

function renderCard(j) {
  const title   = j.name||'Untitled';
  const company = j.company?.name||'';
  const locs    = (j.locations||[]).map(l=>l.name).join(', ')||'San Diego, CA';
  const cats    = (j.categories||[]).map(c=>c.name);
  const levels  = (j.levels||[]).map(l=>l.name);
  const desc    = strip(j.contents||'').trim();
  const url     = j.refs?.landing_page||'#';
  const date    = ago(j.publication_date);
  const saved   = isSaved(url);
  return `
    <div class="jcard ${saved?'is-saved':''}">
      <div class="jtitle">${esc(title)}</div>
      <div class="jmeta">
        ${company?`<span class="jco">${esc(company)}</span><span class="jdot">·</span>`:''}
        <span>📍 ${esc(locs)}</span>
        ${levels.map(l=>`<span class="tag tag-l">${esc(l)}</span>`).join('')}
        ${cats.map(c=>`<span class="tag">${esc(c)}</span>`).join('')}
      </div>
      ${desc?`<div class="jdesc">${esc(desc)}</div>`:''}
      <div class="jact">
        <a href="${esc(url)}" target="_blank" class="btn btn-g btn-sm">View ↗</a>
        <button class="btn btn-g btn-sm" data-copy-url="${esc(url)}">📋 Copy URL</button>
        ${desc?`<button class="btn btn-g btn-sm" data-copy-desc="${esc(desc.slice(0,3000))}">Copy Description</button>`:''}
        <button class="btn btn-p btn-sm" data-analyze="${esc(url)}">Analyze in InFlow</button>
        ${saved
          ?`<span class="tag tag-l">Saved ✓</span>`
          :`<button class="btn btn-g btn-sm" data-save='${JSON.stringify({title,company,url,desc:desc.slice(0,500)})}'>Save</button>`}
        ${date?`<span class="jdate">${date}</span>`:''}
      </div>
    </div>`;
}

function renderPagn(total, cur) {
  const btns=[];
  if(cur>1) btns.push(`<button class="btn btn-g btn-sm" data-page="${cur-1}">← Prev</button>`);
  const lo=Math.max(1,cur-2), hi=Math.min(total,cur+2);
  for(let i=lo;i<=hi;i++) btns.push(`<button class="btn ${i===cur?'btn-p':'btn-g'} btn-sm" data-page="${i}">${i}</button>`);
  if(cur<total) btns.push(`<button class="btn btn-g btn-sm" data-page="${cur+1}">Next →</button>`);
  return `<div class="pagn">${btns.join('')}</div>`;
}

/* ── Saved ── */

/* ─── Event wiring ───────────────────────────────────────── */
function wire() {
  const on = (id, ev, fn) => { const el=document.getElementById(id); if(el) el.addEventListener(ev,fn); };
  const $ = sel => document.querySelectorAll(sel);

  /* Nav tabs */
  $('[data-nav]').forEach(el => el.addEventListener('click', () => { S.view=el.dataset.nav; S.discMode=null; render(); }));
  $('[data-back]').forEach(el => el.addEventListener('click', () => { S.discMode=null; S.view=el.dataset.back; render(); }));

  /* Setup */
  on('setupRes','input', e => { S.resume=e.target.value; document.getElementById('resLen').textContent=`${S.resume.length} chars${S.resume.length<50?' — paste your resume above':' ✓'}`; });
  on('setupGo','click', () => {
    S.resume = document.getElementById('setupRes').value.trim();
    S.apiKey = document.getElementById('setupKey').value.trim();
    if (S.resume.length < 50) { toast('Paste more of your resume first.'); return; }
    localStorage.setItem(KEYS.resume, S.resume);
    if (S.apiKey) localStorage.setItem(KEYS.apiKey, S.apiKey);
    S.view = 'discover'; render();
  });
  on('setupSkip','click', () => {
    S.resume = document.getElementById('setupRes').value.trim();
    S.apiKey = document.getElementById('setupKey').value.trim();
    if (S.resume) localStorage.setItem(KEYS.resume, S.resume);
    if (S.apiKey) localStorage.setItem(KEYS.apiKey, S.apiKey);
    S.view = 'discover'; render();
  });

  /* Discover */
  on('discAI','click', runAI);
  on('discQuiz','click', () => { S.discMode='quiz'; S.quizStep=0; S.quizAns={}; render(); });
  $('[data-sector]').forEach(el => el.addEventListener('click', () => {
    const s = SECTORS[+el.dataset.sector];
    doSearch(s.kw, s.cat, '');
  }));
  $('[data-srch]').forEach(el => el.addEventListener('click', () => {
    doSearch(el.dataset.srch, '', el.dataset.level||'');
  }));

  /* Quiz */
  $('[data-qi]').forEach(el => el.addEventListener('click', () => {
    S.quizAns[S.quizStep] = QS[S.quizStep].opts[+el.dataset.qi];
    S.quizStep++;
    render();
  }));
  on('qback','click', () => { S.quizStep = Math.max(0, S.quizStep-1); render(); });
  on('retake','click', () => { S.quizStep=0; S.quizAns={}; render(); });

  /* Search */
  on('doSearch','click', () => doSearch(
    document.getElementById('skw')?.value.trim()||'',
    document.getElementById('scat')?.value||'',
    document.getElementById('slvl')?.value||''
  ));
  on('skw','keydown', e => { if(e.key==='Enter') document.getElementById('doSearch')?.click(); });

  /* Pagination */
  $('[data-page]').forEach(el => el.addEventListener('click', () => {
    doSearch(S.lastQ.kw, S.lastQ.cat, S.lastQ.level, +el.dataset.page);
  }));

  /* Job actions */
  $('[data-copy-url]').forEach(el => el.addEventListener('click', () => copyText(el.dataset.copyUrl, 'URL copied! Paste into InFlow.')));
  $('[data-copy-desc]').forEach(el => el.addEventListener('click', () => copyText(el.dataset.copyDesc, 'Description copied! Paste into InFlow.')));
  $('[data-analyze]').forEach(el => el.addEventListener('click', () => analyzeInFlow(el.dataset.analyze)));
  $('[data-save]').forEach(el => el.addEventListener('click', () => {
    try { saveJob(JSON.parse(el.dataset.save)); } catch {}
  }));

  /* Saved */
  $('[data-status-url]').forEach(el => el.addEventListener('change', () => setStatus(el.dataset.statusUrl, el.value)));
  $('[data-remove]').forEach(el => el.addEventListener('click', () => removeJob(el.dataset.remove)));

  /* Settings */
  on('setRes','input', e => { S.resume=e.target.value; const l=document.getElementById('setResLen'); if(l)l.textContent=`${S.resume.length} chars${S.resume.length>=50?' ✓':''}`; });
  on('saveRes','click', () => { S.resume=(document.getElementById('setRes')?.value||'').trim(); localStorage.setItem(KEYS.resume,S.resume); toast('Resume saved!'); render(); });
  on('setKey','input', e => S.apiKey=e.target.value);
  on('saveKey','click', () => { S.apiKey=(document.getElementById('setKey')?.value||'').trim(); localStorage.setItem(KEYS.apiKey,S.apiKey); toast('API key saved!'); render(); });
  on('clearKey','click', () => { S.apiKey=''; localStorage.removeItem(KEYS.apiKey); toast('Key cleared'); render(); });
  on('clearSaved','click', () => { if(!confirm('Clear all saved jobs?')) return; S.savedJobs=[]; persS(); toast('Cleared'); render(); });
}

/* ─── Init ───────────────────────────────────────────────── */
loadStorage();
render();
</script>
